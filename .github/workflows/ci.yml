name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  frontend:
    # WIP: o frontend ainda tem dívida (lint + tsc). Job INFORMATIVO —
    # cada passo é não-bloqueante até o baseline ficar verde; então é só
    # remover os `continue-on-error` para virar gate de verdade.
    name: Frontend · lint · typecheck · build (informativo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # lint + build são BLOQUEANTES (frontend já passa nos dois).
      - run: npm run lint
      - run: npm run build
      # typecheck ainda informativo: ~76 erros de tipo em telas WIP.
      - run: npx tsc -p tsconfig.app.json
        continue-on-error: true
